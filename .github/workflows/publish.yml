# To use this workflow:
# 1. Add NPM_TOKEN to repository secrets (Settings > Secrets and variables > Actions)
# 2. Generate token at https://www.npmjs.com/settings/YOUR_USERNAME/tokens (Automation type)
# 3. Trigger manually via Actions tab or push a version tag (e.g., git tag v0.2.3 && git push --tags)

name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
